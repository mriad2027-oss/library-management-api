version: '3.9'

# ── Networks ──────────────────────────────────────────────────────────────────
networks:
  library-net:
    driver: bridge

# ── Volumes ───────────────────────────────────────────────────────────────────
volumes:
  postgres-data:
  redis-data:

# ── Services ──────────────────────────────────────────────────────────────────
services:

  # ── PostgreSQL database ────────────────────────────────────────────────────
  db:
    image: postgres:16-alpine
    container_name: library-db
    environment:
      POSTGRES_DB: library_db
      POSTGRES_USER: library_user
      POSTGRES_PASSWORD: library_pass
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - library-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U library_user -d library_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── Redis cache ────────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: library-redis
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    volumes:
      - redis-data:/data
    networks:
      - library-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    restart: unless-stopped

  # ── FastAPI backend ────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: library-backend
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://library_user:library_pass@db:5432/library_db
      REDIS_URL: redis://redis:6379
      SECRET_KEY: docker-super-secret-key-change-in-production-abc123xyz
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 60
      CACHE_EXPIRE_SECONDS: 300
      ALLOWED_ORIGINS: '["http://localhost","http://localhost:80","http://localhost:8080","http://127.0.0.1","http://127.0.0.1:8080"]'
      MAX_BORROW_LIMIT: 5
      LOG_LEVEL: INFO
      LOG_FILE: logs/app.log
    ports:
      - "8000:8000"
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - library-net
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""]
      interval: 30s
      timeout: 10s
      start_period: 20s
      retries: 3
    restart: unless-stopped

  # ── Frontend (nginx static server) ────────────────────────────────────────
  frontend:
    image: nginx:alpine
    container_name: library-frontend
    depends_on:
      - backend
    volumes:
      - ./frontend:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "8080:80"
    networks:
      - library-net
    restart: unless-stopped
